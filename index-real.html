<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRI Institute · Event Task Creator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark-blue: #061723;
    --navy: #0c2d42;
    --golden: #948459;
    --golden-bar: #786b52;
    --golden-light: #d2cdaa;
    --white: #ffffff;
    --w80: rgba(255,255,255,0.8);
    --w50: rgba(255,255,255,0.5);
    --w20: rgba(255,255,255,0.2);
    --w10: rgba(255,255,255,0.1);
    --w06: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --border-gold: rgba(148,132,89,0.4);
    --radius: 8px;
  }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--dark-blue);
    background-image: radial-gradient(ellipse at 20% 20%, rgba(12,45,66,0.8) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(12,45,66,0.6) 0%, transparent 50%);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }
  .header { text-align: center; margin-bottom: 48px; }
  .logo-lockup { display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
  .logo-svg { width: 90px; height: auto; }
  .header-gold-line { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--golden), transparent); margin: 0 auto 20px; }
  .header h1 { font-family: 'Literata', serif; font-size: 26px; font-weight: 500; color: var(--white); line-height: 1.3; margin-bottom: 8px; }
  .header p { font-size: 13px; font-weight: 300; color: var(--w50); letter-spacing: 0.03em; }
  .card { background: rgba(12,45,66,0.5); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 620px; backdrop-filter: blur(12px); overflow: hidden; }
  .card-section { padding: 28px 32px; border-bottom: 1px solid var(--border); }
  .card-section:last-child { border-bottom: none; }
  .section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--golden); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border-gold); opacity: 0.5; }
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--w50); margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  input[type="text"], input[type="date"] {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 400;
    color: var(--white); background: var(--w06); transition: border-color .2s, background .2s, box-shadow .2s;
    outline: none; -webkit-appearance: none; color-scheme: dark;
  }
  input:focus { border-color: var(--golden); background: rgba(148,132,89,0.08); box-shadow: 0 0 0 3px rgba(148,132,89,0.15); }
  input::placeholder { color: var(--w20); }
  .hint { margin-top: 6px; font-size: 11px; font-weight: 300; color: var(--w50); line-height: 1.5; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat { flex: 1; background: var(--w06); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; text-align: center; }
  .stat-num { font-family: 'Literata', serif; font-size: 24px; font-weight: 600; color: var(--golden); line-height: 1; }
  .stat-lbl { font-size: 10px; font-weight: 500; color: var(--w50); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .task-preview { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
  .task-preview::-webkit-scrollbar { width: 3px; }
  .task-preview::-webkit-scrollbar-thumb { background: var(--golden-bar); border-radius: 4px; }
  .parent-group { margin-bottom: 10px; }
  .parent-label { font-size: 10px; font-weight: 700; color: var(--golden); text-transform: uppercase; letter-spacing: 0.1em; padding: 6px 0; display: flex; align-items: center; gap: 8px; }
  .parent-label::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--golden); border-radius: 2px; flex-shrink: 0; }
  .task-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--w06); border-radius: 5px; margin-left: 11px; gap: 12px; border: 1px solid transparent; }
  .task-name { font-size: 12px; font-weight: 400; color: var(--w80); flex: 1; }
  .task-due { font-size: 10px; font-weight: 600; color: var(--dark-blue); background: var(--golden); border-radius: 3px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0; }
  .task-due.no-date { background: var(--w20); color: var(--w50); }
  .btn { width: 100%; padding: 14px 24px; border: none; border-radius: var(--radius); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-primary { background: linear-gradient(135deg, var(--golden) 0%, var(--golden-bar) 100%); color: var(--dark-blue); box-shadow: 0 4px 20px rgba(148,132,89,0.3); }
  .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, var(--golden-light) 0%, var(--golden) 100%); box-shadow: 0 6px 28px rgba(148,132,89,0.45); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .status-box { border-radius: var(--radius); padding: 14px 16px; font-size: 12px; line-height: 1.7; display: none; border: 1px solid; }
  .status-box.show { display: block; }
  .status-box.info { background: rgba(12,45,66,0.6); border-color: var(--border); color: var(--w80); }
  .status-box.success { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; }
  .status-box.error { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: #f87171; }
  .log-line { padding: 2px 0; display: flex; align-items: flex-start; gap: 8px; }
  .progress-bar-wrap { height: 2px; background: var(--w10); border-radius: 99px; overflow: hidden; margin-top: 14px; display: none; }
  .progress-bar-wrap.show { display: block; }
  .progress-bar { height: 100%; background: linear-gradient(to right, var(--golden-bar), var(--golden)); border-radius: 99px; width: 0%; transition: width .3s ease; }
  .footer-tag { margin-top: 32px; font-size: 10px; font-weight: 300; color: var(--w20); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }
</style>
</head>

    groupDiv.innerHTML = '<div class="parent-label">' + code + ' - ' + group.parentName + '</div>';
    group.tasks.forEach(t => {
      let dueLabel = '—'; let noDate = true;
      if (t.daysBeforeEvent !== null && eventDate) {
        const due = new Date(eventDate); due.setDate(due.getDate() - t.daysBeforeEvent);
        dueLabel = due.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }); noDate = false;
      } else if (t.daysBeforeEvent !== null) { dueLabel = 'D-' + t.daysBeforeEvent; noDate = false; }
      const row = document.createElement('div'); row.className = 'task-row';
      row.innerHTML = '<span class="task-name">' + code + ' ' + t.name + '</span><span class="task-due ' + (noDate ? 'no-date' : '') + '">' + dueLabel + '</span>';
      groupDiv.appendChild(row);
    });
    container.appendChild(groupDiv);
  });
}

const NEAREST_FRIDAY_TASKS = [
  'Confirmed Programme Deadline',
  'Tentative Programme Deadline',
  'Deadline to clean Tier 1',
];

function adjustForWeekend(date) {
  const day = date.getDay(); // 0 = Sunday, 6 = Saturday
  if (day === 6) date.setDate(date.getDate() - 1); // Saturday → Friday
  if (day === 0) date.setDate(date.getDate() - 2); // Sunday → Friday
  return date;
}

function nearestFriday(date) {
  const day = date.getDay(); // 0=Sun, 1=Mon, ..., 5=Fri, 6=Sat
  if (day === 5) return date; // already Friday
  // days to previous Friday
  const daysToPrev = day === 0 ? 2 : day + 2 <= 7 ? day - 5 + 7 : day - 5;
  const prev = new Date(date); prev.setDate(date.getDate() - ((day + 2) % 7));
  // days to next Friday
  const next = new Date(date); next.setDate(date.getDate() + ((5 - day + 7) % 7));
  // return whichever is closer (prefer previous on tie)
  return (date - prev) <= (next - date) ? prev : next;
}

function calcDueDate(eventDateStr, days, taskName) {
  if (days === null || !eventDateStr) return null;
  const d = new Date(eventDateStr + 'T12:00:00'); d.setDate(d.getDate() - days);
  if (taskName && NEAREST_FRIDAY_TASKS.some(n => taskName.includes(n))) {
    const nf = nearestFriday(d);
    d.setTime(nf.getTime());
  } else {
    adjustForWeekend(d);
  }
  return d.toISOString().split('T')[0];
}
function notionHeaders(token) { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Notion-Version': NOTION_VERSION }; }
function setStatus(msg, type) { const box = document.getElementById('statusBox'); box.innerHTML = msg; box.className = 'status-box show ' + (type || 'info'); }
function setProgress(pct) { document.getElementById('progressWrap').className = 'progress-bar-wrap show'; document.getElementById('progressBar').style.width = pct + '%'; }
function log(icon, msg) { const box = document.getElementById('statusBox'); box.innerHTML += '<div class="log-line"><span>' + icon + '</span><span>' + msg + '</span></div>'; box.scrollTop = box.scrollHeight; }

async function findOrCreateProject(token, projectName) {
  const r = await fetch('https://api.notion.com/v1/databases/' + PROJECTS_DS + '/query', { method: 'POST', headers: notionHeaders(token), body: JSON.stringify({ filter: { property: 'Project Name', title: { equals: projectName } }, page_size: 1 }) });
  const d = await r.json();
  if (d.results && d.results.length > 0) return { id: d.results[0].id, created: false };
  const cr = await fetch('https://api.notion.com/v1/pages', { method: 'POST', headers: notionHeaders(token), body: JSON.stringify({ parent: { database_id: PROJECTS_DS }, properties: { 'Project Name': { title: [{ text: { content: projectName } }] }, 'Status': { status: { name: 'Planning' } }, 'Project Type': { select: { name: 'event' } } } }) });
  const cd = await cr.json();
  if (!cd.id) throw new Error('Error creating project: ' + JSON.stringify(cd));
  return { id: cd.id, created: true };
}

async function createTask(token, taskName, dueDate, projectId) {
  const props = { 'Request title': { title: [{ text: { content: taskName } }] }, 'Status': { status: { name: 'Not Started' } }, 'Project': { relation: [{ id: projectId }] } };
  if (dueDate) props['Due Date'] = { date: { start: dueDate } };
  const r = await fetch('https://api.notion.com/v1/pages', { method: 'POST', headers: notionHeaders(token), body: JSON.stringify({ parent: { database_id: TASKS_DS }, properties: props }) });
  const d = await r.json();
  if (!d.id) throw new Error('Error creating task "' + taskName + '": ' + JSON.stringify(d));
  return d.id;
}

async function setParentTask(token, childId, parentId) {
  await fetch('https://api.notion.com/v1/pages/' + childId, { method: 'PATCH', headers: notionHeaders(token), body: JSON.stringify({ properties: { 'Parent-task_': { relation: [{ id: parentId }] } } }) });
}
